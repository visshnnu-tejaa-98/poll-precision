# Railway/Nixpacks build config.
#
# Use `npm install` instead of the default `npm ci`. Our package-lock.json is
# generated on macOS (arm64), so it lacks the Linux-only optional dependencies
# that `sharp` needs there (@emnapi/runtime, @emnapi/core, @img/sharp-linux-*).
# `npm ci` fails on that mismatch; `npm install` resolves the correct platform
# binaries at build time on Railway's Linux host.
# `--include=dev` forces devDependencies (prisma, tailwindcss, typescript) to be
# installed even if the build runs in production mode — they're needed by
# `npm run build` (prisma generate + next build + tailwind).
[phases.install]
cmds = ["npm install --include=dev --no-audit --no-fund"]
